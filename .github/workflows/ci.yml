name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一 ref の古い実行はキャンセルして無駄を省く
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      # macOS runner には swiftlint がプリインストールされている。
      # baseline は 0 violations なので --strict で新規 warning を即失敗にする。
      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  build-test:
    name: Build & Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .spm
          key: ${{ runner.os }}-spm-${{ hashFiles('project.yml') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & Test (no code signing)
        run: |
          set -o pipefail
          xcodebuild test \
            -project EvenG2Bridge.xcodeproj \
            -scheme EvenG2Bridge \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -clonedSourcePackagesDirPath .spm \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify
