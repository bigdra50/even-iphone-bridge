included:
  - Sources
  - Tests

excluded:
  - .build
  - .spm
  - DerivedData
  - EvenG2Bridge.xcodeproj

disabled_rules:
  - todo # PoC 段階の TODO/FIXME を許容
  - trailing_comma # 配列リテラル末尾カンマを許容 (diff を小さく保つ)

line_length:
  warning: 120
  error: 200
  ignores_comments: true # 日本語コメント行の長さは無視

identifier_name:
  min_length: 1 # 局所変数の単一文字 (g, v, b 等) を許容
  max_length: 50

reporter: xcode
